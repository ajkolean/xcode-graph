name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Verify the git tag matches the package.json version
      - name: Verify version alignment
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GIT_TAG#v}"

          if [[ "${PKG_VERSION}" != "${TAG_VERSION}" ]]; then
            echo "::error::Git tag ${GIT_TAG} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi

          # Verify base version (before -suffix) matches the xcodegraph field
          XCGRAPH_VERSION=$(node -p "require('./package.json').xcodegraph")
          BASE_VERSION="${PKG_VERSION%%-*}"

          if [[ "${BASE_VERSION}" != "${XCGRAPH_VERSION}" ]]; then
            echo "::error::Package base version (${BASE_VERSION}) does not match xcodegraph version (${XCGRAPH_VERSION}). Package version must be ${XCGRAPH_VERSION} or ${XCGRAPH_VERSION}-<suffix>"
            exit 1
          fi

          echo "Version ${PKG_VERSION} aligned with XcodeGraph ${XCGRAPH_VERSION}"

      - run: pnpm test:run

      - run: pnpm build:lib

      - run: npm publish --tag latest --provenance

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --generate-notes
