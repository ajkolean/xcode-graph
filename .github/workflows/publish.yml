name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Verify the git tag matches the package.json version
      - name: Verify version alignment
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GIT_TAG#v}"

          if [[ "${PKG_VERSION}" != "${TAG_VERSION}" ]]; then
            echo "::error::Git tag ${GIT_TAG} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi

          # Verify major.minor aligns with the xcodegraph field
          XCGRAPH_VERSION=$(node -p "require('./package.json').xcodegraph")
          PKG_MAJOR_MINOR=$(echo "${PKG_VERSION}" | cut -d. -f1-2)
          XCG_MAJOR_MINOR=$(echo "${XCGRAPH_VERSION}" | cut -d. -f1-2)

          if [[ "${PKG_MAJOR_MINOR}" != "${XCG_MAJOR_MINOR}" ]]; then
            echo "::error::Package major.minor (${PKG_MAJOR_MINOR}) does not match xcodegraph major.minor (${XCG_MAJOR_MINOR}). Run: pnpm version:sync <xcodegraph-version>"
            exit 1
          fi

          echo "Version ${PKG_VERSION} aligned with XcodeGraph ${XCGRAPH_VERSION}"

      - run: pnpm test:run

      - run: pnpm build:lib

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
