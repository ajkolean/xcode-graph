version = 1

test_patterns = ["src/**/*.test.ts"]

exclude_patterns = [
  ".typedoc-out/**",
  "templates/**",
  "src/test-utils/**",
  "src/styles/tokens.ts",
  "src/shared/schemas/cluster.schema.ts",
  "src/shared/schemas/error.schema.ts",
  "src/shared/schemas/simulation.schema.ts",
  "src/main.ts",
  "src/graph/test-helpers/**",
  "src/graph/workers/layout.worker.ts",
  "src/graph/workers/micro-layout.worker.ts",
  "vite.config.ts",
  "vite.lib.config.ts"
]

[[analyzers]]
name = "javascript"

  [analyzers.meta]
  environment = [
    "vitest",
    "browser",
    "nodejs"
  ]
  skip_doc_coverage = [
    "class-expression",
    "method-definition",
    "function-expression",
    "function-declaration"
  ]

[[analyzers]]
name = "test-coverage"

  [analyzers.meta]
