version = 1

test_patterns = ["src/**/*.test.ts"]

exclude_patterns = [
  ".typedoc-out/**",
  "templates/**",
  "src/test-utils/**",
  "src/styles/tokens.ts",
  "src/shared/schemas/cluster.schema.ts",
  "src/shared/schemas/error.schema.ts",
  "src/shared/schemas/simulation.schema.ts"
]

[[analyzers]]
name = "javascript"

  [analyzers.meta]
  environment = [
    "vitest",
    "browser",
    "nodejs"
  ]

[[analyzers]]
name = "test-coverage"

  [analyzers.meta]
