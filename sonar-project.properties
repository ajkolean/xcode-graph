sonar.projectKey=ajkolean_xcode-graph
sonar.organization=ajkolean

# Project display name
sonar.projectName=xcode-graph

# Source code location (only analyze src directory)
sonar.sources=src

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions - exclude build output, dependencies, and generated files
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/storybook-static/**,**/*.js,**/*.d.ts

# Test file patterns
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# TypeScript configuration
sonar.typescript.tsconfigPath=tsconfig.json